<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portão de Entrada | Grupo L&H</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00509e;
            --secondary: #003366;
            --success: #10b981;
            --bg: #0f172a; /* Fundo escuro para destacar os cards */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 80, 158, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 51, 102, 0.2) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .header-box { margin-bottom: 50px; }
        .header-box h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        .header-box p { color: #94a3b8; font-size: 1.1rem; }

        /* Barra de Busca de Unidades */
        .search-unidade {
            max-width: 400px;
            margin: 0 auto 40px;
            position: relative;
        }
        .search-unidade input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .search-unidade i { position: absolute; left: 20px; top: 18px; color: #64748b; }

        .grid-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .unit-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .unit-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .unit-card:hover::before { transform: translateX(100%); }

        .unit-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon-circle {
            width: 80px; height: 80px;
            background: rgba(0, 80, 158, 0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px;
            font-size: 2rem;
            color: var(--primary);
            transition: 0.4s;
        }

        .unit-card:hover .icon-circle {
            background: var(--primary);
            color: white;
            transform: rotateY(180deg);
        }

        .unit-info h2 { font-size: 1.6rem; margin-bottom: 5px; }
        .unit-info span { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .status-badge {
            margin-top: 20px;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .last-access {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 0.6rem;
            background: var(--primary);
            padding: 4px 8px;
            border-radius: 6px;
            opacity: 0.8;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-box">
            <h1>Grupo Econômico L&H</h1>
            <p>Selecione o ecossistema que deseja gerenciar hoje</p>
        </header>

        <div class="search-unidade">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Procurar unidade ou CNPJ...">
        </div>

        <div class="grid-selection">
            
            <a href="/set_empresa/leao" class="unit-card">
                <div class="last-access"><i class="fas fa-history"></i> ÚLTIMO ACESSO</div>
                <div class="icon-circle">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="unit-info">
                    <h2>Leão Serviços</h2>
                    <span>Administrativo & Terceirização</span>
                </div>
                <div class="status-badge">OPERACIONAL</div>
            </a>

            <a href="/set_empresa/health" class="unit-card">
                <div class="icon-circle">
                    <i class="fas fa-heart-pulse"></i>
                </div>
                <div class="unit-info">
                    <h2>Health Max</h2>
                    <span>Gestão de Saúde & Plantões</span>
                </div>
                <div class="status-badge">OPERACIONAL</div>
            </a>

        </div>

        <footer style="margin-top: 60px; color: #475569; font-size: 0.8rem;">
            Autenticado como: <strong>Nicolas Ricardo K. L. Silva</strong><br>
            Sessão segura via SSL 256-bit
        </footer>
    </div>

</body>
</html>
