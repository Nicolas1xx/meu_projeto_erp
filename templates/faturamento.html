<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Faturamento | Grupo L&H</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00509e;
            --secondary: #003366;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
            --white: #ffffff;
            --sidebar-w: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--white); height: 100vh; position: fixed; padding: 30px 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .sidebar-brand { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; text-align: center; border-bottom: 2px solid var(--bg); padding-bottom: 20px; }
        .nav-item { display: flex; align-items: center; padding: 15px; color: #555; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .company-badge { background: var(--primary); color: white; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; }

        /* Abas Interativas */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #e9ecef; padding: 5px; border-radius: 15px; width: fit-content; }
        .tab-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; background: transparent; }
        .tab-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Forms e Cards */
        .card { background: var(--white); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.4s ease; }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: #444; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }

        /* Upload Area Personalizada */
        .upload-box { 
            border: 2px dashed #d1d9e0; padding: 30px; border-radius: 15px; 
            text-align: center; cursor: pointer; transition: 0.3s; background: #f8fafc;
            margin-bottom: 25px;
        }
        .upload-box:hover { border-color: var(--primary); background: #f0f7ff; }
        .upload-box i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }

        .btn-save { 
            background: var(--primary); color: white; border: none; padding: 15px 40px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-save:hover { background: var(--secondary); transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">GRUPO L&H</div>
        <a href="/dashboard" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="/faturamento" class="nav-item active"><i class="fas fa-file-invoice-dollar"></i> Faturamento</a>
        <a href="/rh" class="nav-item"><i class="fas fa-users-cog"></i> RH Corporativo</a>
        <a href="/contratos" class="nav-item"><i class="fas fa-file-contract"></i> Contratos</a>
        <a href="/logout" class="nav-item" style="margin-top: 80px; color: var(--danger);"><i class="fas fa-power-off"></i> Sair</a>
    </nav>

    <main class="main">
        <div class="header">
            <div>
                <h1>Gestão Financeira</h1>
                <p style="color: #888;">Controle de entradas, saídas e obrigações fiscais</p>
            </div>
            <div class="company-badge">{{ empresa }}</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'receber')">Contas a Receber</button>
            <button class="tab-btn" onclick="openTab(event, 'pagar')">Contas a Pagar</button>
        </div>

        <div class="card">
            <div id="receber" class="form-section active">
                <h3 style="margin-bottom: 25px;"><i class="fas fa-arrow-down" style="color: var(--success);"></i> Novo Recebimento</h3>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="tipo_doc" value="Contas a Receber">
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label>Cliente / Município</label>
                            <input type="text" placeholder="Ex: Prefeitura de Itapeva" required>
                        </div>
                        <div class="input-group">
                            <label>Data de Emissão</label>
                            <input type="date" required>
                        </div>
                        <div class="input-group">
                            <label>Valor da Nota (R$)</label>
                            <input type="number" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>

                    <label>Documentação (Anexar NF e Nota de Empenho)</label>
                    <div class="upload-box" onclick="document.getElementById('file-rec').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Clique para selecionar ou arraste os arquivos PDF</p>
                        <input type="file" id="file-rec" name="arquivo" hidden required>
                    </div>

                    <button type="submit" class="btn-save">Registrar Entrada</button>
                </form>
            </div>

            <div id="pagar" class="form-section">
                <h3 style="margin-bottom: 25px;"><i class="fas fa-arrow-up" style="color: var(--danger);"></i> Novo Pagamento</h3>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="tipo_doc" value="Contas a Pagar">
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label>Categoria de Despesa</label>
                            <select name="layout" required>
                                <option value="" disabled selected>Selecione o Layout...</option>
                                <optgroup label="Utilidade Pública">
                                    <option>Água / Luz / Telefone / Internet</option>
                                </optgroup>
                                <optgroup label="Aluguéis">
                                    <option>Aluguel Imóvel (Itapeva/Buri)</option>
                                    <option>Aluguel Equipamento USG</option>
                                </optgroup>
                                <optgroup label="Materiais e Insumos">
                                    <option>Escritório / Enfermagem / EPI</option>
                                    <option>Mercado / Limpeza</option>
                                </optgroup>
                                <optgroup label="Impostos e Taxas">
                                    <option>IPTU / ISS / ISSQN</option>
                                    <option>Simples Nacional / GPS / FGTS</option>
                                </optgroup>
                                <optgroup label="Licitações e Sistemas">
                                    <option>BLL / BNC / Licitar Digital</option>
                                    <option>Ponto Eletrônico / Clínica de Imagem</option>
                                </optgroup>
                                <optgroup label="Contabilidade">
                                    <option>Escritório Juiz de Fora - MG</option>
                                    <option>Escritório Avaré - SP</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Data de Vencimento</label>
                            <input type="date" required>
                        </div>
                        <div class="input-group">
                            <label>Valor do Boleto (R$)</label>
                            <input type="number" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="input-group" style="margin-bottom: 25px;">
                        <label>Código de Barras ou Chave PIX</label>
                        <textarea rows="2" placeholder="Cole aqui a linha digitável ou chave PIX para facilitar o pagamento"></textarea>
                    </div>

                    <label>Upload do Boleto / Arquivo da Conta (PDF)</label>
                    <div class="upload-box" onclick="document.getElementById('file-pag').click()">
                        <i class="fas fa-file-invoice"></i>
                        <p>Clique para subir o arquivo da conta</p>
                        <input type="file" id="file-pag" name="arquivo" hidden required>
                    </div>

                    <button type="submit" class="btn-save" style="background: var(--secondary);">Registrar Despesa</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("form-section");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
