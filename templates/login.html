<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Grupo L&H</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00509e;
            --secondary: #003366;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            background: var(--white);
            overflow: hidden;
        }

        /* Lado Esquerdo: Identidade Visual */
        .brand-side {
            flex: 1.2;
            background: linear-gradient(135deg, #001f3f 0%, #00509e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            padding: 40px;
        }

        .brand-side::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1;
        }

        .logo-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .logo-placeholder {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 0 auto 30px;
        }

        .logo-placeholder i { font-size: 4rem; color: var(--primary); }

        .brand-side h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .brand-side p { font-size: 1.2rem; opacity: 0.8; margin-top: 15px; font-weight: 300; }

        /* Lado Direito: Formulário */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: var(--bg);
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .login-box h2 { color: var(--secondary); font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
        .login-box p { color: #64748b; margin-bottom: 40px; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 10px; }
        
        .input-container { position: relative; }
        .input-container i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        
        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 80, 158, 0.1); }

        .btn-enter {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-enter:hover { background: var(--secondary); transform: translateY(-2px); }

        .footer-info { margin-top: 40px; font-size: 0.75rem; color: #94a3b8; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="brand-side">
        <div class="logo-content">
            <div class="logo-placeholder">
                <i class="fas fa-building-shield"></i>
            </div>
            <h1>GRUPO L&H</h1>
            <p>Excelência em Gestão e Terceirização</p>
        </div>
    </div>

    <div class="form-side">
        <div class="login-box">
            <h2>Bem-vindo</h2>
            <p>Identifique-se para acessar o ERP.</p>

            <form action="/login" method="POST">
                <div class="form-group">
                    <label>CPF do Colaborador</label>
                    <div class="input-container">
                        <i class="fas fa-user"></i>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Sua Senha</label>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-enter">ENTRAR NO SISTEMA</button>
            </form>

            <div class="footer-info">
                © 2026 Grupo L&H Serviços e Saúde.<br>
                Acesso monitorado. Em caso de dúvidas, contate o TI.
            </div>
        </div>
    </div>

    <script>
        // Máscara de CPF Automática
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, "");
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            }
            e.target.value = v;
        });
    </script>
</body>
</html>
